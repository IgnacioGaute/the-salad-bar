        - paragraph [ref=e24]:
          - text: Nuestros valores destacan que
          - generic [ref=e25]: COMER BIEN ES UNA FORMA DE AUTO RESPETO
          - text: y comer bien es una combinación que reúne calidad, sabor, conciencia, servicio y experiencia. Somos muy exigentes con la calidad y frescura de nuestros insumos, queremos darte lo mejor y en un entorno que te haga sentir bien. Buscamos que cada visita se sienta para vos una experiencia ligera, fresca y con aire de vacaciones, que refleja un estilo de vida, por lo que en estos años creamos una propuesta que asegura un público fiel, que no solo conecta con el producto sino emocionalmente con la marca.
      - img "Barra de ensaladas con ingredientes frescos" [ref=e28]
    - generic [ref=e40]:
      - heading "PROPUESTA GASTRONÓMICA" [level=2] [ref=e42]:
        - text: PROPUESTA
        - text: GASTRONÓMICA
      - list [ref=e43]:
        - listitem [ref=e44]: Desayunos, brunch y meriendas
        - listitem [ref=e46]: Armá tu propia ensalada / The Salad Bar + de 55 ingredientes
        - listitem [ref=e48]: Pre Set Bowls
        - listitem [ref=e50]: Sopas
        - listitem [ref=e52]: Platos elaborados
        - listitem [ref=e54]: Wraps y Sandwiches
        - listitem [ref=e56]: Jugos naturales y smoothies
        - listitem [ref=e58]: "The Bar: aperitivos, vinos y cerveza"
      - paragraph [ref=e60]: En The Salad Bar, creemos que lo rico y nutritivo pueden ir de la mano. Cocinamos con pasión y atención al detalle, cuidando la calidad de los ingredientes y los métodos de cocción para destacar sus sabores naturales.
      - paragraph [ref=e61]: "Completa nuestra propuesta: desayunos, brunch, meriendas y el bar, siguiendo la misma línea. Veganos, vegetarianos y celíacos también encontrarán opciones, sin ser restrictivo."
      - paragraph [ref=e62]: Siendo razonables con los precios, generosos con las porciones y exigentes con la calidad, logramos un producto que hace que la gente nos recomiende y quiera volver.
    - generic [ref=e66]:
      - heading "CAFETERIA EASY NIGHTS" [level=2] [ref=e68]:
        - text: CAFETERIA
        - text: EASY NIGHTS
      - paragraph [ref=e69]: Siguiendo la misma linea y con un gran desafío nos comprometemos a brindarte en cada brunch, merienda, tentempié y a cualquier hora, propuestas de las que estamos enamorados, smoothies, panqueques, tostones llenos de nutrición, pastelería de nuestra cocina, jugos naturales para levantar cualquier estado y por supuesto café, para nosotros de la mejor calidad. Sentite libre, sentite liviano, sentite sano. Nosotros nos comprometemos a cuidarte.
      - paragraph [ref=e70]: Y parte de llevar una vida saludable nos habla de esas charlas con amigos, de ese ratito de despeje al ir terminando el dia, un aperitivo , una picadita y buena musica. Easy nights crean el ambiente perfecto para esa pausa, para que te relajes, desconectes, las charlas fluyan y te pongas al dia.
